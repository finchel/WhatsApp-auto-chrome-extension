<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Messages</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #f0f2f5;
      color: #111b21;
      direction: rtl;
    }
    h1 {
      font-size: 16px;
      color: #00a884;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #667781;
      margin-bottom: 16px;
    }
    .section {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #54656f;
    }
    textarea {
      width: 100%;
      height: 56px;
      padding: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      border: 1px solid #d1d7db;
      border-radius: 6px;
      resize: vertical;
      direction: rtl;
      outline: none;
    }
    textarea:focus { border-color: #00a884; }
    .template-group { margin-bottom: 10px; }
    .template-group:last-child { margin-bottom: 0; }
    .info {
      font-size: 11px;
      color: #667781;
      margin-top: 6px;
    }
    .info code {
      background: #e9edef;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .warning {
      color: #dc3545;
      font-size: 11px;
      margin-top: 4px;
      display: none;
    }
    .saved-names-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .saved-names-header h2 {
      font-size: 13px;
      color: #54656f;
    }
    .toggle-icon {
      font-size: 12px;
      color: #667781;
      transition: transform 0.2s;
    }
    .toggle-icon.open { transform: rotate(90deg); }
    #namesList {
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    #namesList.open { display: block; }
    .name-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 13px;
    }
    .name-item:last-child { border-bottom: none; }
    .name-en { color: #667781; }
    .name-he { font-weight: bold; }
    .name-gender {
      font-size: 11px;
      color: #00a884;
      margin: 0 4px;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #dc3545;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    .delete-btn:hover { color: #a71d2a; }
    .empty-msg {
      font-size: 12px;
      color: #667781;
      text-align: center;
      padding: 8px;
    }
    .status {
      font-size: 11px;
      color: #00a884;
      text-align: center;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.visible { opacity: 1; }
    .import-export {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .import-export button {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #d1d7db;
      border-radius: 6px;
      background: #f0f2f5;
      color: #54656f;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .import-export button:hover {
      background: #e2e5e9;
    }
    #importFile {
      display: none;
    }
    .import-status {
      font-size: 11px;
      text-align: center;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .import-status.visible { opacity: 1; }
    .import-status.success { color: #00a884; }
    .import-status.error { color: #dc3545; }
    .footer-links {
      text-align: center;
      padding: 8px 0 4px;
      font-size: 11px;
    }
    .footer-links a {
      color: #667781;
      text-decoration: none;
      margin: 0 6px;
    }
    .footer-links a:hover { color: #00a884; }
    .donate-link {
      display: block;
      text-align: center;
      margin-top: 6px;
      font-size: 11px;
    }
    .donate-link a {
      color: #0070ba;
      text-decoration: none;
    }
    .donate-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>WhatsApp הודעות אישיות</h1>
  <p class="subtitle">לחצו על צ'אט 1:1 בוואטסאפ להוספת הודעה אישית</p>

  <div class="section">
    <div class="template-group">
      <label for="templateMale">תבנית לזכר:</label>
      <textarea id="templateMale" placeholder="הכניסו תבנית הודעה לזכר"></textarea>
    </div>
    <div class="template-group">
      <label for="templateFemale">תבנית לנקבה:</label>
      <textarea id="templateFemale" placeholder="הכניסו תבנית הודעה לנקבה"></textarea>
    </div>
    <div class="info">השתמשו ב-<code>&lt;name&gt;</code> כמציין מיקום לשם בעברית</div>
    <div id="warningMale" class="warning">חסר <code>&lt;name&gt;</code> בתבנית לזכר</div>
    <div id="warningFemale" class="warning">חסר <code>&lt;name&gt;</code> בתבנית לנקבה</div>
    <div id="saveStatus" class="status">נשמר ✓</div>
  </div>

  <div class="section">
    <div class="saved-names-header" id="namesToggle">
      <h2>שמות שנשמרו</h2>
      <span class="toggle-icon" id="toggleIcon">▶</span>
    </div>
    <div id="namesList"></div>
    <div class="import-export">
      <button id="exportBtn">ייצוא שמות</button>
      <button id="importBtn">ייבוא שמות</button>
      <input type="file" id="importFile" accept=".json">
    </div>
    <div id="importStatus" class="import-status"></div>
  </div>

  <div class="footer-links">
    <a href="https://github.com/finchel/WhatsApp-auto-chrome-extension/issues" target="_blank">דיווח באג / בקשת תכונה</a>
    &middot;
    <a href="https://github.com/finchel/WhatsApp-auto-chrome-extension" target="_blank">GitHub</a>
  </div>
  <div class="donate-link">
    <a href="https://www.paypal.com/paypalme/finchel" target="_blank">&#x2615; אהבתם? תתמכו בפרויקט</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
